---
layout: abstract
---
<main class="container-fluid blog">
  <div class="row">
    {% assign years = site.posts | group_by_exp:"post", "post.date | date: '%Y'" %}
    {% for year in years %}
    <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 mb-5">
      <h2 id="{{ year.name }}" class="my-0 px-0">{{ year.name }}</h2>
      <hr/>
      {% for post in year.items %}
        <div class="col border-right">
          <a href="{{ post.url }}">{{ post.title }}<br/><time>{{ post.date | date: "%b %-d, %Y" }}</time></a>
        </div>
      {% endfor %}
      </div>
    {% endfor %}
  </div>
</main>
