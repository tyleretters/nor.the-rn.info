---
layout: abstract
---
<main class="container-fluid blog">
  <div class="row">
    {% assign years = site.posts | group_by_exp:"post", "post.date | date: '%Y'" %}
    {% for year in years %}
    <div class="col-sm-12 col-md-6 col-lg-4 col-xl-3 mb-5">
      <h1 id="{{ year.name }}">{{ year.name }}</h1>
      {% for post in year.items %}
        <div class="col">
          <a href="{{ post.url }}" class="a-block-link">{{ post.title }}<br/><time class="small">{{ post.date | date: "%b %-d, %Y" }}</time></a>
        </div>
      {% endfor %}
      </div>
    {% endfor %}
  </div>
</main>
