---
layout: default
---
{% for post in site.posts limit:3 %}
<div class="row row-img-100 mb-5">
  <div class="col">
    <article class="post">
      <h1>{{ post.title | escape }}</h1>
      <em>{%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}{{ post.date | date: date_format }}</em> · <a href="{{ post.url | relative_url }}">Link</a>
      <hr class="hr-standard">
      {{ post.content }}
    </article>
  </div>
</div>
{% endfor %}
<div class="row mb-5">
  <div class="col">
    <h2>More Posts</h2>
    <a href="/archives" class="block-link">Archives</a>
  </div>
</div>
