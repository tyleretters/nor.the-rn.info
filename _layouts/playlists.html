---
layout: abstract
---
<main class="container-fluid">
  <div class="row">
    <div class="col">
      <div class="container-fluid px-0">
        <div class="row border-bottom general-title">
          <div class="col border-right">
            <h1>{{ page.title }}</h1>
          </div>
        </div>
        <div class="row general-content">
          {% assign playlist_by_order = site.data.playlists %}
          {% for playlist in playlist_by_order %}
          <article class="col-sm-12 col-md-4 bg-white text-black border-right border-bottom">
            <h1>{{ playlist.title }}</h2>
            {% if playlist.url %}<p><a href="{{ playlist.url }}" class="btn-listen">Listen</a></p>{% endif %}
            {{ playlist.content | markdownify }}
          </article>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</main>
