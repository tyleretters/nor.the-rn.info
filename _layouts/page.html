---
layout: abstract
---
<main class="container-fluid page">
  <div class="row">
    <div class="col">
      <article class="container-fluid px-0 mb-5">
        <div class="row">
          <div class="col">
            <h1>{{ page.title }}</h1>
          </div>
        </div>
        <div class="row border-bottom">
          <div class="col">
            {{ page.content | markdownify }}
          </div>
        </div>
      </article>
    </div>
  </div>
</main>
