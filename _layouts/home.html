<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

{% include head.html %}

<body class="home">

{% include header.html %}

<main class="container-fluid two-col">

{% for item in site.data.home.items %}
<div class="home-image mb-5">
  <a href="{{ item.url }}">
    <img src="{{ site.baseurl}}/assets/images/{{ item.img }}" alt="{{ item.title }}" />
  </a>
</div>
{% endfor %}

</main>

{% include footer.html %}

{% include javascript.html %}

</body>

</html>
