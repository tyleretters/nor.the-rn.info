---
layout: abstract
---
<main class="container-fluid home text-center">
  <div class="row">
    <div class="col">
      <h1 class="my-3">Northern Information, LLC</h1>
      {% for i in (0..2) %}
      {% assign post = site.posts[i] %}
      <p class="mb-1"><a href="{{ post.url }}">{{ post.title }}, <time>{{ post.date | date: "%b %-d, %Y" }}</time></a></p>
      {% endfor %}
      <p class="mb-5"><a href="/blog">All Posts &rarr;</a></p>
    </div>
  </div>
</main>
