---
layout: abstract
---
<main class="container-fluid books">
  <div class="row">
    <div class="col">
      <article class="container-fluid px-0 mb-5">
        <div class="row">
          <div class="col col-md-8 offset-md-2 mb-5">
            {% for book in site.data.books %}
            <article class="mb-5">
              <h1>{{ book.title }}</h2>
              {{ book.content | markdownify }}
            </article>
            {% endfor %}
          </div>
        </div>
      </article>
    </div>
  </div>
</main>
