---
layout: abstract
---
<main class="container-fluid page">
  <div class="row">
    <div class="col">
      <article class="container-fluid px-0">
        <div class="row border-bottom">
          <div class="col col-md-8 offset-md-2 border-right">
            <h1>{{ page.title }}</h1>
            {{ content }}
          </div>
        </div>
        <div class="row border-bottom">
          <div class="col col-md-8 offset-md-2 border-right">
            {% for book in site.data.books %}
            <article class="mb-5">
              <h1>{{ book.title }}</h2>
              {{ book.content | markdownify }}
            </article>
            {% endfor %}
          </div>
        </div>
      </article>
    </div>
  </div>
</main>
