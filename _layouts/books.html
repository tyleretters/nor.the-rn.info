---
layout: default
---
<div class="row">
  <div class="col upper">
    {{ content }}
  </div>
</div>
{% assign books_by_order = site.data.books.items %}
{% for book in books_by_order %}
<div class="row mb-5">
  <div class="col">
    <h1>{{ book.title }}</h1>
    <hr>
    <div class="content">
      {{ book.content | markdownify }}
    </div>
  </div>
</div>
{% endfor %}
