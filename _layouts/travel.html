---
layout: default
---
<div class="row">
  <div class="col upper">
    {{ content }}
  </div>
</div>
<div class="row mb-5">
{% assign travel_by_order = site.data.travel.items %}
{% for travel in travel_by_order %}
  <div class="col-md-4 mb-5 travel-item img-100 img-link">
    <img src="/assets/images/travel/{{ travel.image }}" alt="{{ travel.title }}" />
    <h2>{{ travel.title }}</h2>
    <p><time>{{ travel.date }}</time> · {{ travel.location }}</p>
    {{ travel.content | markdownify }}
  </div>
{% endfor %}
</div>
