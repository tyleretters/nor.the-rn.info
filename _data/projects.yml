- order: 202403
  title: Intertext
  dates: 2018 - Present
  image: /assets/images/intertext-2024.png
  content: |
    [Intertext](https://intertext.bandcamp.com) is where I release my music. It is a hermitic, one-man, non-label. Intertext has no branding, no lettermark, no mission, no social media presence, no marketing strategy. This paragraph is the only "about" section that exists. Mark Fisher introduced me to the word and if you're looking to get lost in a wormhole, I highly recommend [this Wikipedia article](https://en.wikipedia.org/wiki/Intertextuality).

- order: 202401
  title: norns community
  dates: 2021 - Present
  image: /assets/images/norns-community-v2-explore.png
  content: |
    [norns community](https://norns.community) is a script wiki for the monome norns sound computer. [Read about my redesign process here](/2023/05/27/rebuilding-norns-community).

- order: 202402
  title: Photography
  dates: 2005 - Present
  image: /assets/images/manifesto.jpg
  content: |
    I started working with film in 2005 at [Columbia College Chicago](https://www.colum.edu). After learning my way around the darkroom I started experimenting with crossprocessing and multipe exposures. This image is a manifesto of sorts: quadruple exposure, crossprocessed, no Photoshop.

    I used to have a bunch of my work on Flickr. Some of terms of the latest platform ownership transfer made me uncomfortable so I took it all down. [Some photos survive on the Photos page.](/photography)

- order: 202301
  title: Klang Magazine
  dates: 2023 - 2024
  image: /assets/images/klang-magazine.png
  content: |
    [Klang Magazine](https://klangmag.co/about) was a bi-lingual, independent sound publication.

- order: 202102
  title: FLASH CRASH
  dates: 2021 - 2022
  image: /assets/images/flash-crash-event.jpg
  content: |
    [FLASH CRASH](https://flashcrash.net) was a recursive livecoding online event I organized.

- order: 202101
  title: goldeneye
  dates: 2021
  image: /assets/images/goldeneye.jpg
  content: |
    Entropic background radiation. The last sequencer before the EMPs hit. As always, the conversation is on [llllllll.co](https://l.llllllll.co/goldeneye).

- order: 202006
  title: Yggdrasil
  dates: 2020
  image: /assets/images/yggdrasil.png
  content: |
    Described as "a norns cyberdeck tracker," this project was a rapid release with the "Northern Information Applied Sciences and Phantasms Working Division." Check out the [docs](https://northern-information.github.io/yggdrasil-docs) and see the thread [over at llllllll.co](http://l.llllllll.co/yggdrasil).

- order: 202005
  title: arcologies
  dates: 2020
  image: /assets/images/arcologies.png
  content: |
    Described as "an interactive environment for designing 2d sound arcologies," this project has been my primary focus in 2020. Check out the [docs](https://tyleretters.github.io/arcologies-docs), see the thread [over at llllllll.co](http://l.llllllll.co/arcologies) and watch some of [the numerous videos](https://www.youtube.com/watch?v=vucFRt5Pz1Q&list=PLe1BFUbUceS2N5GLgORKQrw1bsz2ZLwJ3).

- order: 202004
  title: dronecaster
  dates: 2020
  image: /assets/images/dronecaster.png
  content: |
    A community project using [SuperCollider]([https://supercollider.github.io/) to make drones for [norns](https://monome.org/docs/norns). See the thread [over at llllllll.co](http://l.llllllll.co/dronecaster) and watch [the video](https://www.youtube.com/watch?v=sYnHYDg3rhg).

- order: 202003
  title: Cascades
  dates: 2020
  image: /assets/images/cascades.png
  content: |
    Cascades is a grid and arc application for Max4Live. It is the successor to Cascade. It lets you paint with all 65,536 combinations of 16th note patterns across seven tracks. See the thread [over at llllllll.co](http://l.llllllll.co/cascades) and watch [the demo video](https://www.youtube.com/watch?v=zTj_hnY7NlM).

- order: 202002
  title: Conway Music
  dates: 2020
  image: /assets/images/conway-music.png
  content: |
    Conway Music is a grid application for Max4Live. It uses Conway's Game of Life help you create melodies and rhythms. See the thread [over at llllllll.co](http://l.llllllll.co/conway) and watch [the demo video](https://www.youtube.com/watch?v=ptIJ6MizZ88).

- order: 202001
  title: Markov Music
  dates: 2020
  image: /assets/images/markov-music.jpg
  content: |
    Markov Music is a grid application for Max. It uses a simple three-node Markov chain as a backbone to let you create melodies and rhythms. See the thread [over at llllllll.co](http://l.llllllll.co/markov) and watch [the demo video](https://www.youtube.com/watch?v=Ta6-JZP_aJ0).

- order: 201902
  title: Coordinated Universal Time
  dates: 2019
  image: /assets/images/utc.png
  content: |
    [Coordinated Universal Time](https://tyleretters.github.io/apodcastfornow.com/) was a podcast for now. Conceived as a semiotic blitz of found sounds, field recordings, interviews, theory-crafting, science-fiction, sonic collage, and original dub techno. We only had 5 episodes but it was an incredible ride. The [first episode](https://anchor.fm/apodcastfornow/episodes/To-Realize-a-Commoner-Earth-e43vu5) will go down in the history books as one of my favorite pieces of work.
    
    There are audio and video versions of each episode:

    1. **To Realize a Commoner Earth** [Audio](https://anchor.fm/apodcastfornow/episodes/To-Realize-a-Commoner-Earth-e43vu5) \| [Video](https://www.youtube.com/watch?v=MmdfABfeFKQ)
    2. **Angel Marcloid** [Audio](https://anchor.fm/apodcastfornow/episodes/Angel-Marcloid-e4a5sl) \| [Video](https://www.youtube.com/watch?v=1cLiPm7GeEo)
    3. **From the Forest to the Stars** [Audio](https://anchor.fm/apodcastfornow/episodes/From-the-Forest-to-the-Stars-e4hc5h) \| [Video](https://www.youtube.com/watch?v=BV4v9BXr_x4)
    4. **Concourses Above and Below** [Audio](https://anchor.fm/apodcastfornow/episodes/Concourses-Above-and-Below-e5c0r8) \| [Video](https://www.youtube.com/watch?v=v89oFOO_iZI)
    5. **Gabriele de Seta** [Audio](https://anchor.fm/apodcastfornow/episodes/Gabriele-de-Seta-e9ogmu) \| [Video](https://www.youtube.com/watch?v=cKF4b4qWe08)
    
    See [this post](/2019/05/24/coordinated-universal-time) for more info.

- order: 201901
  title: Cascade
  dates: 2019
  image: /assets/images/cascade.png
  content: |
    Cascade is a M4L sequencer that holds every combination of eighth notes possible in a 4/4 bar. I wrote a [lengthly post about it on Highland's blog](https://journal.highlandsolutions.com/meet-cascade-a-piece-of-music-software-i-built-with-max-and-rapid-prototyping-d8ce9bda3a5b) and made [a short demo video](https://www.youtube.com/watch?v=VQhQaYClE78&feature=youtu.be).

    [Download the patch, M4L Device, and demo.](https://s3.us-east-2.amazonaws.com/northerninformation/cascade.zip)
    
    `md5: a4814aa628af0f42ca25465e8870497f`

- order: 201701
  title: Endless Field Studios
  dates: 2005 - 2017
  image: /assets/images/efs.png
  content: |
    Pasha Petrosyan and I founded EFS in 2005 as a label to release our own music. We started with CDs and quickly moved to digital, hosting MP3s of local artists for download before Bandcamp was a thing. We had over 50 releases and more shows than I can remember in our 12 year run.

- order: 201501
  title: Second Chance
  dates: 2015
  image: /assets/images/second-chance.jpg
  content: |
    Explore the world of 'second chance' with your mouse and the WASD keys. Principal development occurred during a Unity workshop at [gli.tc/h 2112](http://gli.tc/h/2112/). Don't fall.

    [Download for macOS.](https://s3.us-east-2.amazonaws.com/northerninformation/second-chance.app.zip)

