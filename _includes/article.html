<article class="container-fluid mb-10 px-0">
  <div class="row">
    <div class="col">
        <h1>{{ post.title }}</h1>
        <p><time>{{ post.date | date: "%b %-d, %Y" }}</time> {% for tag in post.tags %}<a href="/archives/#{{ tag | downcase}}">{{ tag }}</a> · {% endfor %}<a href="{{ post.url }}">Permalink</a> · <a href="{{ site.data.meta.github }}/{{ post.path }}">Edit</a></p>
    </div>
  </div>
  <div class="row">
    <div class="col">
      {{ post.content }}
    </div>
  </div>
</article>
