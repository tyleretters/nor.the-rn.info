{% if page.path contains '_posts' %}
<script>
document.onkeydown = checkKey;
function checkKey(e) {
  e = e || window.event;
  if (e.keyCode == '37') {
    window.location.href = document.querySelector('a.later-post').getAttribute('href')
  }
  if (e.keyCode == '39') {
    window.location.href =  document.querySelector('a.earlier-post').getAttribute('href');
  }
}
</script>
{% endif %}
