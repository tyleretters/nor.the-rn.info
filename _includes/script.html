{% if page.path contains '_posts' %}
  <script>
    const navigate = (selector) => {
      window.location.href = document.querySelector(selector).getAttribute('href')
    }

    const checkKey = (e) => {
      e = e || window.event
      if (e.keyCode == '37') {
    navigate('.later-post')
      }
      if (e.keyCode == '39') {
    navigate('.earlier-post')
      }
    }

    document.onkeydown = checkKey
  </script>
{% endif %}
