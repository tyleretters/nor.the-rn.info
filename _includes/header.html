<header class="container-fluid">
  <div class="row">
    <div class="col pb-1 border-right border-bottom bg-spectrum"></div>
  </div>
  <div class="row">
    <div class="col-sm-12 col-lg-3 px-0 border-right northern-information">
      <a href="/" aria-label="Home" tabindex="0">
        <img src="/assets/images/eye.jpg" alt="Northern Information Logo"/>
        <h1>Northern <br/>Information</h1>
      </a>
    </div>
    <div class="col-sm-12 col-lg-9">
      <div class="row">
        <a href="/blog" aria-label="Blog" class="col-4 col-md-2 border-right{% if page.url == '/blog' or page.id %} active{% endif %}" tabindex="0">
          <span>Blog</span>
        </a>
        <a href="/discography" aria-label="Discography" class="col-4 col-md-2 border-right{% if page.url contains '/discography'%} active{% endif %}" tabindex="0">
          <span>Discography</span>
        </a>
        <a href="/photos" aria-label="Photos" class="col-4 col-md-2 border-right{% if page.url contains '/photos'%} active{% endif %}" tabindex="0">
          <span>Photos</span>
        </a>
        <a href="/projects" aria-label="Projects" class="col-4 col-md-2 border-right{% if page.url contains '/projects'%} active{% endif %}" tabindex="0">
          <span>Projects</span>
        </a>
        <a href="/software" aria-label="Software" class="col-4 col-md-2 border-right{% if page.url contains '/software'%} active{% endif %}" tabindex="0">

        </a>
        <a href="/philosophy" aria-label="Philosophy" class="col-4 col-md-2 border-right{% if page.url contains '/philosophy'%} active{% endif %}" tabindex="0">
          <span>Philosophy</span>

      <div class="row">
        <a href="/playlists" aria-label="Playlists" class="col-4 col-md-2 border-right{% if page.url contains '/playlists'%} active{% endif %}" tabindex="0">

        <a href="/books" aria-label="Books" class="col-4 col-md-2 border-right{% if page.url contains '/books'%} active{% endif %}" tabindex="0">

        </a>
        <a href="/links" aria-label="Links" class="col-4 col-md-2 border-right{% if page.url contains '/links'%} active{% endif %}" tabindex="0">

        </a>

          <span>About</span>
        </a>

          <span>Newsletter</span>
        </a>
        <a href="/feed.xml" aria-label="XML" class="col-4 col-md-2 border-right" tabindex="0">
          <span>XML</span>
        </a>

  <div class="row">
    <div class="col pb-1 border-right border-bottom bg-spectrum"></div>
