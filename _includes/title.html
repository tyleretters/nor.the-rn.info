<div class="container-fluid">
  <div class="row invert">
    <div class="col px-0">
      <div class="dummy grid">
        {% if page.sagas | size > 0 %}
          <h1 class="mb-0">Blog</h1>
          <p>The moon sets, the batteries run dry, and a cold, dreamless sleep overcomes...</p>
        {% else %}
          {% if page.title %}<h1 class="mb-0">{{ page.title }}</h1>{% endif %}
          {{ page.subtitle | markdownify }}
        {% endif %}
      </div>
    </div>
  </div>
</div>
