<div class="container-fluid">
  <div class="row invert">
    <div class="col pt-5 px-0">
      <div class="dummy">
        {% if page.sagas | size > 0 %}
          <h1>Blog</h1>
          <p>The moon sets, the batteries run dry, and a cold, dreamless sleep overcomes...</p>
        {% else %}
          <h1>{{ page.title }}</h1>
          {{ page.subtitle | markdownify }}
        {% endif %}
      </div>
    </div>
  </div>
</div>
